- name: public_table_names
  description: Lists all tables in the 'public' schema.
  sql: SELECT table_name FROM information_schema.tables WHERE table_schema = 'public'
- name: active_usernames
  description: Lists all active user names from the pg_stat_activity view.
  sql: SELECT usename FROM pg_stat_activity WHERE pid != pg_backend_pid() AND state
    = 'active';
