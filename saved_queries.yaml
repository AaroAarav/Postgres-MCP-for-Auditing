- name: top_5_slowest_queries
  description: Returns the top 5 slowest queries based on their execution time.
  sql: SELECT * FROM mcp_audit_log ORDER BY duration_ms DESC LIMIT 5;
- name: get_top_5_largest_table_rows
  description: Retrieves the top 5 rows from the largest table based on size.
  sql: SELECT * FROM mcp_audit_log ORDER BY id DESC LIMIT 5;
- name: audit_log_high_duration
  description: Retrieves users and their respective durations from the mcp_audit_log
    where the duration is greater than 100ms.
  sql: SELECT db_user, duration_ms FROM mcp_audit_log WHERE duration_ms > 100;
